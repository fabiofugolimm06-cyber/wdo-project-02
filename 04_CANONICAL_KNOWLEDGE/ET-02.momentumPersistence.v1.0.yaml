  market_logic: "Inércia posicional de participantes alinhados. Pullbacks são rasos e logo absorvidos."

regime_validity: [NORMAL_VOL, TREND_DAY]

trigger:
  id: TRG-02
  observable: "Vela1 tem direção definida"
  measurement: "close_vela1 != open_vela1"

confirmation:
  ids: [CNF-01, CNF-02]
  logic: AND

invalidation:
  conditions: [INV-01, INV-02, INV-04]

parameters:
  fixed:
    - name: MIN_BREAKOUT_POINTS
      value: 0.5
      source: "provisional (Northington / EC-SIZE-03)"
    - name: VOLUME_SURGE_MULT
      value: 1.0
      source: "provisional (Clenow)"
  adaptive: []

failure_modes_primary: [FM-EPI-01, FM-EXE-01]
walkforward_required: true
oos_degradation_max: 0.20
retail_implementable: true
