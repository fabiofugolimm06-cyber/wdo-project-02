  ids: [CNF-03]
  logic: AND

invalidation:
  conditions: [INV-02, INV-04]

parameters:
  fixed:
    - name: LOOKBACK_CANDLES
      value: 5
      source: "provisional (Dalton)"
    - name: MIN_TOUCHES
      value: 2
      source: "provisional (Dalton)"
  adaptive: []

failure_modes_primary: [FM-EPI-01, FM-STR-01]
walkforward_required: true
oos_degradation_max: 0.20
retail_implementable: true
