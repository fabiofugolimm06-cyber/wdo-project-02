# CI — WDO PROJECT 02
# Bloqueia merge quando status check falhar (configure Branch Protection no GitHub).

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONPATH: .
      PYTHONHASHSEED: "42"
      WDO_CI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify PYTHONPATH / imports
        run: |
          python -c "from microstructure.determinism import set_global_determinism; set_global_determinism(); print('import OK')"

      - name: Run full test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Determinism stress (10x pipeline + critical test)
        run: |
          python -m pytest \
            tests/test_ci_determinism_stress.py \
            tests/test_model_v1.py::TestModelPipelineIntegration::test_full_pipeline \
            tests/test_project_determinism.py \
            -v --tb=short
